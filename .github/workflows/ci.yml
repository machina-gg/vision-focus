name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Type check
        run: pnpm type-check

      - name: Unit tests
        run: pnpm test --run --passWithNoTests

      - name: Build
        run: pnpm build

      - name: E2E tests
        if: hashFiles('e2e/**/*.spec.ts', 'e2e/**/*.test.ts', 'playwright.config.ts') != ''
        run: |
          pnpm exec playwright install --with-deps chromium
          pnpm test:e2e
